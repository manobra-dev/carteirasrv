<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factsheet — Eleva MFO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#e8edf4;color:#2d3748;font-size:13px}

/* ── TOOLBAR ── */
.toolbar{background:#fff;border-bottom:2px solid #e2e8f0;padding:10px 28px;display:flex;align-items:center;gap:14px}
.btn-print{display:flex;align-items:center;gap:7px;padding:8px 20px;border:none;background:#1a2d5a;color:#fff;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;letter-spacing:.3px;transition:background .15s}
.btn-print:hover{background:#2c5282}
.btn-print:disabled{background:#a0aec0;cursor:not-allowed}
.toolbar-note{font-size:11px;color:#718096}

/* ── SHEET (simula página A4) ── */
.sheet{max-width:860px;margin:24px auto;background:#fff;box-shadow:0 3px 16px rgba(0,0,0,.14);border-radius:4px;overflow:hidden;page-break-after:always}
.sheet:last-of-type{page-break-after:auto}

/* ── HEADER ── */
.pg-header{background:linear-gradient(135deg,#1a2d5a 0%,#2c5282 55%,#2b6cb0 100%);color:#fff;padding:14px 24px 12px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo-img{height:44px;width:auto;object-fit:contain;filter:drop-shadow(0 1px 4px rgba(0,0,0,.3))}
.logo-fallback{display:none;font-size:16px;font-weight:800;letter-spacing:.5px;color:#fff}
.hdr-right{text-align:right}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:.3px}
.hdr-sub{font-size:10px;opacity:.72;margin-top:2px}
.hdr-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:8px}
.pill{background:rgba(255,255,255,.15);border-radius:10px;padding:5px 14px;text-align:center;min-width:88px}
.pill .pl{font-size:8px;text-transform:uppercase;letter-spacing:.6px;opacity:.75}
.pill .pv{font-size:15px;font-weight:700;margin-top:2px}
.pos{color:#9ae6b4}.neg{color:#fc8181}.neut{color:#fbd38d}
.dpos{color:#c6f6d5}.dneg{color:#fed7d7}.dneut{color:#fefcbf}

/* ── BODY ── */
.pg-body{padding:14px 18px 18px}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:14px}
.sc{background:#f7fafc;border-radius:7px;padding:9px 10px;text-align:center;border-top:3px solid #2c5282}
.sc.green{border-top-color:#38a169}.sc.amber{border-top-color:#d69e2e}.sc.red{border-top-color:#e53e3e}.sc.purple{border-top-color:#805ad5}
.sc-lbl{font-size:8.5px;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-val{font-size:15px;font-weight:700;color:#1a2d5a;line-height:1}
.sc-sub{font-size:9px;color:#a0aec0;margin-top:3px}

/* ── SECTION ── */
.sect{margin-bottom:14px}
.sect-title{font-size:10.5px;font-weight:700;color:#1a2d5a;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid #e8edf5;padding-bottom:5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sect-title::before{content:'';display:inline-block;width:3px;height:12px;background:#2c5282;border-radius:2px;flex-shrink:0}

/* ── TWO COLUMNS ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

/* ── MONTHLY TABLE ── */
.tbl-rent{width:100%;border-collapse:collapse;font-size:9.5px}
.tbl-rent th{background:#f7fafc;color:#718096;font-weight:700;text-transform:uppercase;font-size:8px;letter-spacing:.4px;padding:4px 3px;text-align:center;border-bottom:2px solid #e2e8f0;white-space:nowrap}
.tbl-rent th.th-left{text-align:left;padding-left:6px}
.tbl-rent td{padding:3px 3px;text-align:center;border-bottom:1px solid #f0f4f8;font-size:9px}
.td-year{font-weight:700;text-align:left;color:#1a2d5a;font-size:10px;padding-left:4px!important}
.td-lbl{text-align:left!important;font-size:8.5px;color:#718096;padding-left:8px!important;white-space:nowrap}
.td-pos{color:#276749;font-weight:600}.td-neg{color:#c53030;font-weight:600}
.td-dp{color:#38a169;font-size:8.5px}.td-dn{color:#e53e3e;font-size:8.5px}
.td-acc{font-weight:700;color:#2c5282}
.yr-sep td{height:5px;background:#f7fafc;border:none}
.bench-row td{color:#718096}
.delta-row{background:#fafbfd!important}
.delta-row td{font-size:8.5px}

/* ── ATIVOS TABLE ── */
.tbl-ativos{width:100%;border-collapse:collapse;font-size:10.5px}
.tbl-ativos th{background:#f7fafc;color:#718096;font-weight:700;text-transform:uppercase;font-size:8px;letter-spacing:.4px;padding:5px 7px;text-align:left;border-bottom:2px solid #e2e8f0}
.tbl-ativos th.num{text-align:right}
.tbl-ativos td{padding:5px 7px;border-bottom:1px solid #f7fafc;vertical-align:middle}
.tbl-ativos td.num{text-align:right;font-weight:600}
.tbl-ativos .tr-total td{background:#f7fafc;border-top:2px solid #e2e8f0;font-weight:700}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:8.5px;font-weight:600;color:#fff;white-space:nowrap}
.dy-val{color:#276749;font-weight:600}

/* ── INFO PANEL ── */
.tbl-info{width:100%;border-collapse:collapse}
.tbl-info td{padding:5px 8px;font-size:11px;border-bottom:1px solid #f0f4f8}
.tbl-info tr:last-child td{border-bottom:none}
.info-lbl{color:#718096;width:58%}
.info-val{text-align:right;font-weight:600;color:#2d3748}
.info-pos{color:#276749}.info-neg{color:#c53030}
.info-sep td{height:6px;background:#f7fafc;border:none!important}

/* ── CHART WRAPS ── */
.ch-wrap{position:relative;width:100%}
.ch-wrap canvas{display:block}
.note{font-size:9px;color:#a0aec0;margin-top:6px;font-style:italic;line-height:1.4}

/* ── FOOTER ── */
.pg-footer{font-size:8.5px;color:#b0bec5;padding:8px 18px;border-top:1px solid #e8edf5;line-height:1.5}

/* ── LOADING ── */
.loading{text-align:center;padding:60px;color:#a0aec0;font-size:14px}

/* ═══════════════════════════════
   PRINT
═══════════════════════════════ */
@media print{
  @page{size:A4 portrait;margin:7mm 9mm 11mm}
  *,*::before,*::after{print-color-adjust:exact!important;-webkit-print-color-adjust:exact!important}
  body{background:#fff!important}
  .toolbar{display:none!important}
  .sheet{max-width:100%!important;margin:0!important;box-shadow:none!important;border-radius:0!important;break-after:page;overflow:visible!important}
  .sheet:last-of-type{break-after:auto}
  .pg-body{padding:10px 12px 12px!important}
  /* Garante fundo azul mesmo que o Chrome não imprima gradients */
  .pg-header{padding:10px 14px!important;background:#1a2d5a!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .logo-img{height:36px!important}
  .stat-row{gap:6px!important;margin-bottom:10px!important}
  .sc{padding:7px 8px!important}
  .sect{margin-bottom:10px!important}
  .two-col{gap:10px!important}
  .sect-title{margin-bottom:7px!important;padding-bottom:4px!important}
  /* Fallback caso o usuário use Ctrl+P diretamente */
  .ch-wrap canvas{max-width:100%!important}
  .ch-wrap img{max-width:100%!important;height:auto!important}
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="btn-print" onclick="exportPDF()">⬇ Salvar como PDF</button>
  <span class="toolbar-note" id="toolbar-note">Selecione <strong>Salvar como PDF</strong> no diálogo de impressão para exportar</span>
</div>

<!-- ══════════════════════════════
     PÁGINA 1 — Dados Históricos
══════════════════════════════ -->
<div class="sheet" id="sheet1">
  <div class="pg-header">
    <div>
      <img src="logo_eleva_branco.png" alt="Eleva MFO" class="logo-img"
           onerror="this.style.display='none';document.getElementById('lf1').style.display='block'">

      <div class="hdr-pills" id="h-pills1"></div>
    </div>
  </div>
  <div class="pg-body" id="body1"><div class="loading">⏳ Carregando dados…</div></div>
  <div class="pg-footer" id="footer1"></div>
</div>

<!-- ══════════════════════════════
     PÁGINA 2 — Gráficos
══════════════════════════════ -->
<div class="sheet" id="sheet2">
  <div class="pg-header">
    <div>
      <img src="logo_eleva_branco.png" alt="Eleva MFO" class="logo-img"
           onerror="this.style.display='none';document.getElementById('lf2').style.display='block'">
      <span id="lf2" class="logo-fallback">Eleva</span>
    </div>
    <div class="hdr-right">
      <div class="hdr-title" id="h-title2">Carteiras Temáticas de Renda Variável</div>
      <div class="hdr-sub" id="h-sub2">Relatório Mensal — —</div>
    </div>
  </div>
  <div class="pg-body" id="body2"><div class="loading">⏳ Carregando dados…</div></div>
  <div class="pg-footer" id="footer2"></div>
</div>

<script>
// ────────────────────────────────────────────────
//  Factsheet v2 — Eleva MFO  (estilo Alaska/Encore)
// ────────────────────────────────────────────────

// ── Constantes ──
const SECTOR_MAP = {
  'BPAC11':'Financeiro','BBAS3':'Financeiro','ITUB4':'Financeiro','BBDC4':'Financeiro',
  'JPMC34':'Financeiro','B3SA3':'Financeiro','SANB11':'Financeiro','BPAN4':'Financeiro',
  'CXSE3':'Seguros','BBSE3':'Seguros',
  'WEGE3':'Indústria','GGBR4':'Siderurgia',
  'VALE3':'Mineração','AURA33':'Mineração',
  'AXIA3':'Energia Elétrica','AXIA6':'Energia Elétrica','CPLE3':'Energia Elétrica',
  'CPLE5':'Energia Elétrica','CPLE6':'Energia Elétrica','CPFE3':'Energia Elétrica',
  'ENEV3':'Energia','CSMG3':'Saneamento',
  'RADL3':'Saúde','IGTI11':'Shoppings',
  'IVVB11':'Índices','NDIV11':'Índices','SMAL11':'Índices',
  'PETR4':'Petróleo & Gás','SUZB3':'Petroquímica',
  'EMBJ3':'Aviação',
  'JBSS32':'Agroindústria','TTEN3':'Agroindústria','JBBS3':'Agroindústria',
  'ARZZ3':'Moda','AZZA3':'Moda',
};
const SECTOR_COLORS = {
  'Financeiro':'#3182ce','Energia Elétrica':'#d69e2e','Mineração':'#718096',
  'Saneamento':'#38a169','Saúde':'#e53e3e','Índices':'#805ad5',
  'Indústria':'#dd6b20','Petróleo & Gás':'#2c7a7b','Agroindústria':'#276749',
  'Siderurgia':'#744210','Shoppings':'#b7791f','Seguros':'#2b6cb0',
  'Aviação':'#553c9a','Petroquímica':'#2d3748','Moda':'#d53f8c',
  'Energia':'#f6ad55','Outros':'#a0aec0'
};
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// ── Estado global ──
let json = null;
let dailyPrices = {};
let monthlyPrices = {};
let wh = {};          // weights_history do portfolio
let allMonths = [];
let compMonth = '';
let benchTkr = '';
let chartInstances = {};

// ── URL param ──
const PORTFOLIO_KEY = new URLSearchParams(location.search).get('portfolio') || 'acoes';

// ── Último fechamento de um ticker num mês ──
function lastClose(ticker, mon) {
  if (!mon) return null;
  const pm = dailyPrices[ticker] || {};
  const days = Object.keys(pm).filter(d => d.startsWith(mon)).sort();
  if (days.length) return Number(pm[days[days.length-1]]);
  const mp = monthlyPrices[ticker] || {};
  return mp[mon] ? Number(mp[mon]) : null;
}

// ── Retorno mensal da carteira (ponderado) ──
function portMonRet(mon) {
  const idx = allMonths.indexOf(mon);
  if (idx < 1) return null;
  const prev = allMonths[idx-1];
  const w = wh[mon] || {};
  let ret = 0, tot = 0;
  Object.entries(w).forEach(([t, wt]) => {
    if (!wt) return;
    const c = lastClose(t, mon), p = lastClose(t, prev);
    if (c && p) { ret += (wt/100)*(c-p)/p*100; tot += wt/100; }
  });
  return tot > 0 ? ret/tot : null;
}

// ── Retorno mensal do benchmark ──
function benchMonRet(mon) {
  const idx = allMonths.indexOf(mon);
  if (idx < 1) return null;
  const prev = allMonths[idx-1];
  const c = lastClose(benchTkr, mon), p = lastClose(benchTkr, prev);
  return (c && p) ? (c-p)/p*100 : null;
}

// ═══ INIT ═══════════════════════════════════════
async function init() {
  try {
    const r = await fetch('./dashboard_data.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    json = await r.json();
  } catch(e) {
    const msg = `<div style="text-align:center;padding:60px;color:#c53030">⚠️ Não foi possível carregar os dados.<br><small style="color:#718096">${e.message}</small></div>`;
    document.getElementById('body1').innerHTML = msg;
    document.getElementById('body2').innerHTML = '';
    return;
  }
  render();
}

// ═══ RENDER ══════════════════════════════════════
function render() {
  wh          = json.weights_history?.[PORTFOLIO_KEY] || {};
  allMonths   = Object.keys(wh).sort();
  dailyPrices   = json.prices_daily || {};
  monthlyPrices = json.prices       || {};

  const lastMonth = allMonths[allMonths.length-1];
  const portName  = PORTFOLIO_KEY === 'acoes' ? 'Carteira de Ações' : 'Carteira de Dividendos';
  benchTkr        = PORTFOLIO_KEY === 'acoes' ? 'BOVA11' : 'DIVO11';
  const benchLbl  = PORTFOLIO_KEY === 'acoes' ? 'Ibovespa (BOVA11)' : 'IDIV (DIVO11)';
  const benchShort= PORTFOLIO_KEY === 'acoes' ? 'Ibovespa' : 'IDIV';

  // Competência = último mês fechado
  const today = new Date();
  const thisM = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  compMonth = lastMonth < thisM ? lastMonth : (allMonths[allMonths.length-2] || lastMonth);
  const [cy, cm] = compMonth.split('-').map(Number);
  const compLabel = `${MESES[cm-1]}/${cy}`;

  // Título da página
  document.title = `Factsheet_${portName.replace(/\s+/g,'_')}_${compMonth}`;
  ['1','2'].forEach(n => {
    document.getElementById(`h-title${n}`).textContent = `${portName} — Eleva Multi-Family Office`;
    document.getElementById(`h-sub${n}`).textContent = `Relatório Mensal — Competência: ${compLabel}`;
  });
  document.getElementById('toolbar-note').innerHTML =
    `<strong>${portName}</strong> · ${compLabel} &nbsp;|&nbsp; Use <strong>Salvar como PDF</strong> no diálogo de impressão`;

  // Tickers ativos (peso > 0 no mês de competência — não inclui rebalanceamentos futuros)
  const tickers = Object.keys(wh[compMonth] || {}).filter(t => (wh[compMonth][t]||0) > 0);

  // Calcula stats
  const stats = computeStats();

  // Footer
  const footerTxt = `⚠ Aviso Legal: Documento exclusivo para uso interno da Eleva Multi-Family Office. Não constitui recomendação de investimento. Rentabilidades passadas não garantem resultados futuros. Dados: ${json.generated_at||'—'} · Gerado em ${new Date().toLocaleString('pt-BR')}`;
  document.getElementById('footer1').textContent = footerTxt;
  document.getElementById('footer2').textContent = footerTxt;

  // ─── PÁGINA 1 ───────────────────────────────
  document.getElementById('body1').innerHTML = `
    <div class="stat-row" id="stat-row"></div>

    <div class="sect">
      <div class="sect-title">Histórico de Rentabilidade — ${portName} vs ${benchShort}</div>
      <div id="tbl-mensal"></div>
    </div>

    <div class="two-col">
      <div class="sect">
        <div class="sect-title">Exposição Setorial — ${compLabel}</div>
        <div class="ch-wrap" id="ch-setor-wrap" style="height:250px">
          <canvas id="ch-setor"></canvas>
        </div>
      </div>
      <div class="sect">
        <div class="sect-title">Dados da Carteira</div>
        <div id="info-panel"></div>
      </div>
    </div>
  `;

  // ─── PÁGINA 2 ───────────────────────────────
  document.getElementById('body2').innerHTML = `
    <div class="sect">
      <div class="sect-title">Performance Acumulada — ${portName} vs ${benchShort}</div>
      <div class="ch-wrap" id="ch-line-wrap" style="height:240px"><canvas id="ch-line"></canvas></div>
      <div class="note">Retorno acumulado por composição diária com pesos mensais. Linha sólida = carteira · tracejada = benchmark.</div>
    </div>

    <div class="sect">
      <div class="sect-title">Drawdown Histórico — ${portName}</div>
      <div class="ch-wrap" id="ch-dd-wrap" style="height:150px"><canvas id="ch-dd"></canvas></div>
      <div class="note">Queda percentual em relação ao pico histórico anterior da carteira (cotações diárias).</div>
    </div>

    <div class="sect">
      <div class="sect-title" id="bar-title">Rentabilidade por Ação — ${compLabel}</div>
      <div class="ch-wrap" id="ch-bar-wrap" style="height:300px"><canvas id="ch-bar"></canvas></div>
      <div class="note">pp = contribuição à rentabilidade da carteira (peso × retorno). Barra cinza = benchmark.</div>
    </div>
  `;

  // ── Renderiza pills no header p1 ──
  renderPills(portName, benchShort, compLabel);

  // ── Renderiza seções ──
  renderStatCards(stats, tickers.length, benchShort);
  renderMonthlyTable(portName, benchShort);
  renderSectorChart(compMonth);
  renderInfoPanel(stats, portName, benchShort, benchLbl);
  renderLineChart(portName, benchLbl);
  renderDrawdown();
  renderBarChart(portName, benchLbl, tickers, compLabel);
}

// ═══ PILLS ════════════════════════════════════
function renderPills(portName, benchShort, compLabel) {
  const idx   = allMonths.indexOf(compMonth);
  const prevM = idx > 0 ? allMonths[idx-1] : null;
  const w     = wh[compMonth] || {};

  let ret = 0, tot = 0;
  Object.entries(w).forEach(([t, wt]) => {
    if (!wt) return;
    const c = lastClose(t, compMonth), p = prevM ? lastClose(t, prevM) : null;
    if (c && p) { ret += (wt/100)*(c-p)/p*100; tot += wt/100; }
  });
  const portRet  = tot > 0 ? ret/tot : null;
  const bc = lastClose(benchTkr, compMonth), bp = prevM ? lastClose(benchTkr, prevM) : null;
  const benchRet = (bc && bp) ? (bc-bp)/bp*100 : null;
  const diff     = (portRet!=null && benchRet!=null) ? portRet-benchRet : null;

  const fmt  = v => v==null ? '—' : `${v>=0?'+':''}${v.toFixed(2)}%`;
  const cls  = v => v==null ? 'neut' : v>=0 ? 'pos' : 'neg';
  const dcls = v => v==null ? 'dneut' : v>=0 ? 'dpos' : 'dneg';

  document.getElementById('h-pills1').innerHTML = `
    <div class="pill">
      <div class="pl">Carteira</div>
      <div class="pv ${cls(portRet)}">${fmt(portRet)}</div>
      <div class="pl">mês</div>
    </div>
    <div class="pill">
      <div class="pl">${benchShort}</div>
      <div class="pv neut">${fmt(benchRet)}</div>
      <div class="pl">mês</div>
    </div>
    ${diff!=null?`<div class="pill">
      <div class="pl">Alpha</div>
      <div class="pv ${dcls(diff)}">${fmt(diff)}</div>
      <div class="pl">vs ${benchShort}</div>
    </div>`:''}`;
}

// ═══ ESTATÍSTICAS ══════════════════════════════
function computeStats() {
  const rets = [];
  let above = 0, below = 0;

  allMonths.filter(m => m <= compMonth).forEach(mon => {
    const pr = portMonRet(mon);
    const br = benchMonRet(mon);
    if (pr !== null) {
      rets.push(pr);
      if (br !== null) { if (pr > br) above++; else below++; }
    }
  });

  const n = rets.length;
  if (!n) return {};

  const mean = rets.reduce((s,r)=>s+r,0)/n;
  const variance = rets.reduce((s,r)=>s+(r-mean)**2,0)/(n-1||1);
  const annualVol = Math.sqrt(variance*12);
  const posMonths = rets.filter(r=>r>0).length;
  const maxMonthly = Math.max(...rets);
  const minMonthly = Math.min(...rets);

  // Retorno 12m
  const last12 = allMonths.filter(m=>m<=compMonth).slice(-12);
  let ret12 = 0;
  last12.forEach(m => { const pr = portMonRet(m); if (pr!==null) ret12=(1+ret12/100)*(1+pr/100)*100-100; });

  // Retorno total acumulado
  let cumRet = 0;
  allMonths.filter(m=>m<=compMonth).forEach(m => { const pr=portMonRet(m); if (pr!==null) cumRet=(1+cumRet/100)*(1+pr/100)*100-100; });

  // Max drawdown (de retornos mensais)
  let peak=100, maxDD=0;
  rets.forEach(r => {
    const val = peak*(1+r/100);
    if (val>peak) peak=val;
    const dd=(val-peak)/peak*100;
    if (dd<maxDD) maxDD=dd;
    peak=Math.max(peak,val);
  });

  return { n, annualVol, maxMonthly, minMonthly, posMonths, above, cumRet, ret12, maxDD };
}

function renderStatCards(s, activeCount, benchShort) {
  if (!s.n) return;

// ═══ TABELA MENSAL ═══════════════════════════════
function renderMonthlyTable(portName, benchShort) {
  const years = [...new Set(allMonths.filter(m=>m<=compMonth).map(m=>m.slice(0,4)))].sort().reverse();
  const cols   = MESES.map((_,i)=>String(i+1).padStart(2,'0'));

  let html = `<table class="tbl-rent"><thead><tr>
    <th class="th-left" style="width:36px">ANO</th>
    <th class="th-left" style="width:80px">Série</th>`;
  cols.forEach(m => html += `<th>${MESES[+m-1]}</th>`);
  html += `<th>Ano</th><th>Acum.</th></tr></thead><tbody>`;

  years.forEach((yr, yi) => {
    const yrM = allMonths.filter(m=>m.startsWith(yr)&&m<=compMonth);
    if (!yrM.length) return;

    let pAcc=0, bAcc=0;
    yrM.forEach(m => {
      const pr=portMonRet(m), br=benchMonRet(m);
      if (pr!=null) pAcc=(1+pAcc/100)*(1+pr/100)*100-100;
      if (br!=null) bAcc=(1+bAcc/100)*(1+br/100)*100-100;
    });

    const allUntil = allMonths.filter(m=>m<=`${yr}-12`&&m<=compMonth);
    let pTot=0, bTot=0;
    allUntil.forEach(m => {
      const pr=portMonRet(m), br=benchMonRet(m);
      if (pr!=null) pTot=(1+pTot/100)*(1+pr/100)*100-100;
      if (br!=null) bTot=(1+bTot/100)*(1+br/100)*100-100;
    });

    const cell = (v, extra='') => {
      if (v==null) return `<td style="color:#dde3ed">—</td>`;
      return `<td class="${v>=0?'td-pos':'td-neg'} ${extra}">${v>=0?'+':''}${v.toFixed(2)}%</td>`;
    };
    const dcell = v => {
      if (v==null) return `<td style="color:#dde3ed">—</td>`;
      return `<td class="${v>=0?'td-dp':'td-dn'}">${v>=0?'+':''}${v.toFixed(2)}%</td>`;
    };

    if (yi>0) html += `<tr class="yr-sep"><td colspan="16"></td></tr>`;

    // Linha carteira
    html += `<tr><td class="td-year" rowspan="3">${yr}</td><td class="td-lbl">${portName.replace('Carteira de ','')}</td>`;
    cols.forEach(m => {
      const mon=`${yr}-${m}`, pr=portMonRet(mon);
      html += (yrM.includes(mon)&&pr!=null) ? cell(pr) : `<td style="color:#dde3ed">—</td>`;
    });
    html += cell(pAcc) + cell(pTot,'td-acc') + '</tr>';

    // Linha benchmark
    html += `<tr class="bench-row"><td class="td-lbl">${benchShort}</td>`;
    cols.forEach(m => {
      const mon=`${yr}-${m}`, br=benchMonRet(mon);
      html += (yrM.includes(mon)&&br!=null) ? cell(br) : `<td style="color:#dde3ed">—</td>`;
    });
    html += cell(bAcc) + cell(bTot) + '</tr>';

    // Linha delta
    html += `<tr class="delta-row"><td class="td-lbl" style="color:#a0aec0">Δ vs bench</td>`;
    cols.forEach(m => {
      const mon=`${yr}-${m}`;
      const pr=portMonRet(mon), br=benchMonRet(mon);
      const d=(pr!=null&&br!=null)?pr-br:null;
      html += (!yrM.includes(mon)||d==null) ? `<td style="color:#dde3ed">—</td>` : dcell(d);
    });
    html += dcell(pAcc-bAcc);
    html += `<td class="${(pTot-bTot)>=0?'td-dp':'td-dn'} td-acc">${(pTot-bTot)>=0?'+':''}${(pTot-bTot).toFixed(2)}%</td></tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('tbl-mensal').innerHTML = html;
}

// ═══ PAINEL DADOS DA CARTEIRA ════════════════════
function renderInfoPanel(s, portName, benchShort, benchLbl) {
  // Retorno acumulado benchmark
  let bCum = 0;
  allMonths.filter(m => m <= compMonth).forEach(m => {
    const br = benchMonRet(m);
    if (br !== null) bCum = (1 + bCum/100)*(1 + br/100)*100 - 100;
  });

  const startDate = json.start_date || allMonths[0] || '—';
  const [sy, sm] = startDate.split('-').map(Number);
  const startLabel = sm ? `${MESES[sm-1]}/${sy}` : startDate;

  const fmtPct = (v, decimals=2) => v==null ? '—' : `${v>=0?'+':''}${v.toFixed(decimals)}%`;
  const fmtAbs = (v, decimals=2) => v==null ? '—' : `${v>=0?'+':''}${v.toFixed(decimals)}%`;

  const alpha  = (s.cumRet!=null && bCum!=null) ? s.cumRet - bCum : null;

  const rows = [
    { lbl:'Início da carteira',   val: startLabel,              plain:true },
    { lbl:'Benchmark',            val: benchLbl,                plain:true },
    { lbl:'Número de ativos',     val: `${s.n!=null?Object.keys(wh[compMonth]||{}).filter(t=>(wh[compMonth][t]||0)>0).length:'—'} ações`, plain:true },
    null, // separador
    { lbl:'Retorno acumulado',    val: fmtPct(s.cumRet),        pos: s.cumRet>=0 },
    { lbl:`${benchShort} acumulado`, val: fmtPct(bCum),         pos: bCum>=0 },
    { lbl:'Alpha acumulado',      val: fmtPct(alpha),           pos: alpha>=0, bold:true },
    null,
    { lbl:'Retorno últimos 12m',  val: fmtPct(s.ret12),         pos: s.ret12>=0 },
    { lbl:'Volatilidade anual.',  val: s.annualVol!=null ? s.annualVol.toFixed(1)+'%' : '—', plain:true },
    { lbl:'Melhor mês',           val: fmtAbs(s.maxMonthly),    pos: true },
    { lbl:'Pior mês',             val: fmtAbs(s.minMonthly),    pos: s.minMonthly>=0 },
  ];

  let html = `<table class="tbl-info">`;
  rows.forEach(r => {
    if (!r) { html += `<tr class="info-sep"><td colspan="2"></td></tr>`; return; }
    const valCls = r.plain ? '' : r.pos ? 'info-pos' : 'info-neg';
    const fontW  = r.bold  ? 'font-weight:700' : '';
    html += `<tr>
      <td class="info-lbl">${r.lbl}</td>
      <td class="info-val ${valCls}" style="${fontW}">${r.val}</td>
    </tr>`;
  });
  html += `</table>`;
  document.getElementById('info-panel').innerHTML = html;
}

// ═══ EXPOSIÇÃO SETORIAL ══════════════════════════
function renderSectorChart(lastMonth) {
  const weights = wh[lastMonth] || {};
  const sec = {};
  Object.entries(weights).forEach(([t,w]) => {
    if (!w) return;
    const s = SECTOR_MAP[t]||'Outros';
    sec[s] = (sec[s]||0)+w;
  });

  const sorted = Object.entries(sec).sort((a,b)=>a[1]-b[1]);
  const labels  = sorted.map(([s])=>s);
  const data    = sorted.map(([,v])=>v);
  const colors  = labels.map(s=>SECTOR_COLORS[s]||'#a0aec0');

  // Ajusta altura ao número de setores (cap para não vazar da página)
  const h = Math.max(160, Math.min(260, labels.length*24+40));
  document.getElementById('ch-setor-wrap').style.height = h+'px';

  if (chartInstances['setor']) chartInstances['setor'].destroy();
  const ctx = document.getElementById('ch-setor').getContext('2d');
  chartInstances['setor'] = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[{ data, backgroundColor:colors, borderWidth:0, borderRadius:3 }] },
    plugins:[{
      id:'secLabels',
      afterDraw(chart) {
        const c2=chart.ctx;
        chart.getDatasetMeta(0).data.forEach((bar,i) => {
          c2.save();
          c2.font='700 10px Segoe UI,Arial,sans-serif';
          c2.fillStyle='#2d3748';
          c2.textAlign='left';
          c2.textBaseline='middle';
          c2.fillText(data[i].toFixed(1)+'%', bar.x+4, bar.y);
          c2.restore();
        });
      }
    }],
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false, animation:false,
      layout:{ padding:{ right:42 }},
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.raw.toFixed(1)}%`}} },
      scales:{
        x:{ grid:{color:'#f0f4f8'}, ticks:{callback:v=>v+'%',font:{size:9}},
            max: Math.ceil(Math.max(...data)/5)*5+5 },
        y:{ grid:{display:false}, ticks:{font:{size:10,weight:'600'},color:'#2d3748'} }
      }
    }
  });
}

// ═══ TABELA DE ATIVOS ════════════════════════════
function renderAtivosTable(refMonth, tickers) {
  const weights = wh[refMonth]||{};
  // Mês anterior ao de competência para mostrar variação de peso
  const idxRef  = allMonths.indexOf(refMonth);
  const prevMon = idxRef > 0 ? allMonths[idxRef-1] : null;
  const prevW   = prevMon ? (wh[prevMon]||{}) : {};

  const rows = tickers
    .filter(t=>(weights[t]||0)>0)
    .map(t=>({ ticker:t, sector:SECTOR_MAP[t]||'Outros', weight:weights[t]||0, prevW:prevW[t]||0 }))
    .sort((a,b)=>b.weight-a.weight);

  const total = rows.reduce((s,r)=>s+r.weight,0);

  let html = `<table class="tbl-ativos">
    <thead><tr>
      <th>Ativo</th><th class="num">Peso</th>
    </tr></thead><tbody>`;

  rows.forEach(r => {
    const sc    = SECTOR_COLORS[r.sector]||'#a0aec0';
    const delta = r.weight - r.prevW;
    // Novo ativo (não existia no mês anterior): destaque especial
    const isNew = prevMon && (prevW[r.ticker]===undefined || prevW[r.ticker]===0);
    const dStr  = isNew
      ? `<span style="color:#2c7a7b;font-size:8px"> ★ novo</span>`
      : delta===0 ? ''
      : delta>0 ? `<span style="color:#38a169;font-size:8.5px"> ▲+${delta}%</span>`
               : `<span style="color:#e53e3e;font-size:8.5px"> ▼${delta}%</span>`;
    html += `<tr>
      <td><strong>${r.ticker}</strong>${dStr}<br>
        <span class="badge" style="background:${sc};font-size:8px">${r.sector}</span></td>
      <td class="num">${r.weight}%</td>
    </tr>`;
  });

  html += `<tr class="tr-total">
    <td><strong>TOTAL</strong></td>
    <td class="num"><strong>${total}%</strong></td>
  </tr></tbody></table>`;

  document.getElementById('tbl-ativos-wrap').innerHTML = html;
}

// ═══ PERFORMANCE ACUMULADA ═══════════════════════
// Usa composição diária (igual ao drawdown) para evitar dependência do
// preço no baseDay que pode não existir em dailyPrices.
function renderLineChart(portName, benchLbl) {
  const allTickers = [...new Set(allMonths.flatMap(m=>Object.keys(wh[m]||{})))];
  const allDays = [...new Set(
    [...allTickers, benchTkr].flatMap(t=>Object.keys(dailyPrices[t]||{}))
  )].sort();
  if (!allDays.length) return;

  // Início: primeiro dia disponível no mês do início da carteira (ou anterior)
  const [sy,sm] = allMonths[0].split('-').map(Number);
  const prevSt  = sm===1 ? `${sy-1}-12` : `${sy}-${String(sm-1).padStart(2,'0')}`;
  const firstDay = allDays.find(d=>d.slice(0,7)>=prevSt) || allDays[0];
  const useDays  = allDays.filter(d=>d>=firstDay && d.slice(0,7)<=compMonth);
  if (!useDays.length) return;

  // Composição diária: portVal e benchVal partem de 100 e crescem dia a dia
  let portVal=100, benchVal=100;
  const step = Math.max(1, Math.floor(useDays.length/300));
  const sampPort=[], sampBench=[], sampLbls=[];

  for (let i=0; i<useDays.length; i++) {
    const day=useDays[i], prev=i>0?useDays[i-1]:null;
    if (prev) {
      // Retorno diário ponderado da carteira
      const mon=day.slice(0,7);
      const w=wh[mon]||wh[allMonths.filter(m=>m<=mon).pop()]||{};
      let dayRet=0, ws=0;
      Object.entries(w).forEach(([t,wt])=>{
        if (!wt) return;
        const dp=dailyPrices[t]||{};
        const cur=Number(dp[day]||0), pv=Number(dp[prev]||0);
        if (cur&&pv){ dayRet+=(wt/100)*(cur-pv)/pv; ws+=wt/100; }
      });
      if (ws>0) portVal*=(1+dayRet/ws);

      // Retorno diário do benchmark
      const bdp=dailyPrices[benchTkr]||{};
      const bc=Number(bdp[day]||0), bp=Number(bdp[prev]||0);
      if (bc&&bp) benchVal*=(1+(bc-bp)/bp);
    }
    if (i%step===0||i===useDays.length-1) {
      sampPort.push(+(portVal-100).toFixed(3));
      sampBench.push(+(benchVal-100).toFixed(3));
      const dt=new Date(day+'T12:00:00Z');
      sampLbls.push(dt.toLocaleDateString('pt-BR',{month:'2-digit',year:'2-digit'}));
    }
  }

  if (chartInstances['line']) chartInstances['line'].destroy();
  const ctx = document.getElementById('ch-line').getContext('2d');
  chartInstances['line'] = new Chart(ctx, {
    type:'line',
    data:{
      labels:sampLbls,
      datasets:[
        { label:portName, data:sampPort,
          borderColor:'#2c5282', backgroundColor:'rgba(44,82,130,.1)',
          borderWidth:2.2, pointRadius:0, fill:true, tension:.25 },
        { label:benchLbl, data:sampBench,
          borderColor:'#e53e3e', borderDash:[5,4],
          borderWidth:1.5, pointRadius:0, fill:false, tension:.25 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{
        legend:{display:true,position:'bottom',labels:{font:{size:10},usePointStyle:true,padding:12}},
        tooltip:{callbacks:{label:c=>` ${c.raw!=null?c.raw.toFixed(2):'—'}%`}}
      },
      scales:{
        x:{ticks:{font:{size:8.5},maxTicksLimit:16},grid:{color:'#f0f4f8'}},
        y:{ticks:{callback:v=>v+'%',font:{size:9}},grid:{color:'#f0f4f8'}}
      }
    }
  });
}

// ═══ DRAWDOWN ════════════════════════════════════
function renderDrawdown() {
  const allTickers = [...new Set(allMonths.flatMap(m=>Object.keys(wh[m]||{})))];
  const allDays = [...new Set(
    allTickers.flatMap(t=>Object.keys(dailyPrices[t]||{}))
  )].sort();
  if (!allDays.length) return;

  const [sy,sm] = allMonths[0].split('-').map(Number);
  const prevSt = sm===1 ? `${sy-1}-12` : `${sy}-${String(sm-1).padStart(2,'0')}`;
  const baseDay = [...allDays].reverse().find(d=>d.slice(0,7)===prevSt)||allDays[0];
  const useDays = allDays.filter(d=>d>=baseDay&&d.slice(0,7)<=compMonth);

  // Computa valor do portfólio dia a dia (retorno composto)
  let portVal = 100;
  let runMax  = 100;
  const ddArr = [];
  const step  = Math.max(1,Math.floor(useDays.length/300));
  const sampDD  = [];
  const sampLbl = [];

  for (let i=0; i<useDays.length; i++) {
    const day=useDays[i], prev=i>0?useDays[i-1]:null;
    if (prev) {
      const mon=day.slice(0,7);
      const w=wh[mon]||wh[allMonths.filter(m=>m<=mon).pop()]||{};
      let dayRet=0, ws=0;
      Object.entries(w).forEach(([t,wt])=>{
        if (!wt) return;
        const dp=dailyPrices[t]||{};
        const cur=Number(dp[day]||0), pv=Number(dp[prev]||0);
        if (cur&&pv){ dayRet+=(wt/100)*(cur-pv)/pv; ws+=wt/100; }
      });
      portVal*=(1+(ws>0?dayRet/ws:0));
    }
    if (portVal>runMax) runMax=portVal;
    const dd=runMax>0?(portVal-runMax)/runMax*100:0;
    if (i%step===0||i===useDays.length-1) {
      sampDD.push(+dd.toFixed(3));
      const dt=new Date(day+'T12:00:00Z');
      sampLbl.push(dt.toLocaleDateString('pt-BR',{month:'2-digit',year:'2-digit'}));
    }
  }

  if (chartInstances['dd']) chartInstances['dd'].destroy();
  const ctx = document.getElementById('ch-dd').getContext('2d');
  chartInstances['dd'] = new Chart(ctx, {
    type:'line',
    data:{
      labels:sampLbl,
      datasets:[{
        label:'Drawdown', data:sampDD,
        borderColor:'#e53e3e', backgroundColor:'rgba(229,62,62,.15)',
        borderWidth:1.5, pointRadius:0, fill:true, tension:.15
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>` ${c.raw!=null?c.raw.toFixed(2):'—'}%`}}
      },
      scales:{
        x:{ticks:{font:{size:8.5},maxTicksLimit:16},grid:{color:'#f0f4f8'}},
        y:{ticks:{callback:v=>v+'%',font:{size:9}},grid:{color:'#f0f4f8'},max:0}
      }
    }
  });
}

// ═══ RENTABILIDADE POR AÇÃO (BARRAS) ═════════════
function renderBarChart(portName, benchLbl, tickers, compLabel) {
  // Mostra retorno do compMonth
  const idx    = allMonths.indexOf(compMonth);
  const prevM  = idx>0 ? allMonths[idx-1] : null;
  if (!prevM) return;

  const wComp = wh[compMonth]||{};
  const items = [];

  tickers.forEach(ticker => {
    const wt = wComp[ticker]||0;
    if (!wt) return;
    const c=lastClose(ticker,compMonth), p=lastClose(ticker,prevM);
    if (!c||!p) return;
    const ret=(c-p)/p*100;
    items.push({label:ticker, ret:+ret.toFixed(2), weight:wt, contrib:+(wt/100*ret).toFixed(2), isBench:false});
  });

  const bc=lastClose(benchTkr,compMonth), bp=lastClose(benchTkr,prevM);
  if (bc&&bp) items.push({label:benchLbl, ret:+((bc-bp)/bp*100).toFixed(2), weight:null, contrib:null, isBench:true});

  items.sort((a,b)=>b.ret-a.ret);

  // Altura calculada para caber na p.2 sem resize no print (overflow:hidden cuida do resto)
  // 20px por item + 50px base, máx 265px garante que não vaza para p.3
  const h = Math.max(200, Math.min(265, items.length*20+50));
  document.getElementById('ch-bar-wrap').style.height = h+'px';

  const ppPlugin = {
    id:'ppLabels',
    afterDraw(chart){
      const c2=chart.ctx, meta=chart.getDatasetMeta(0);
      const zx=chart.scales.x.getPixelForValue(0);
      c2.save(); c2.font='600 9px Segoe UI,Arial,sans-serif';
      c2.textAlign='left'; c2.textBaseline='middle';
      meta.data.forEach((bar,i)=>{
        const it=items[i];
        if (!it||it.isBench||it.contrib==null) return;
        c2.fillStyle=it.contrib>=0?'#276749':'#c53030';
        c2.fillText(`${it.contrib>=0?'+':''}${it.contrib.toFixed(2)}pp`, Math.max(bar.x,zx)+4, bar.y);
      });
      c2.restore();
    }
  };

  if (chartInstances['bar']) chartInstances['bar'].destroy();
  const ctx = document.getElementById('ch-bar').getContext('2d');
  chartInstances['bar'] = new Chart(ctx, {
    type:'bar', plugins:[ppPlugin],
    data:{
      labels:items.map(it=>it.label),
      datasets:[{
        data:items.map(it=>it.ret),
        backgroundColor:items.map(it=>it.isBench?'rgba(113,128,150,.65)':it.ret>=0?'rgba(56,161,105,.82)':'rgba(229,62,62,.78)'),
        borderColor:items.map(it=>it.isBench?'#718096':it.ret>=0?'#276749':'#c53030'),
        borderWidth:1.5, borderRadius:3, borderSkipped:false
      }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false, animation:false,
      layout:{padding:{right:52}},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>{
          const it=items[c.dataIndex];
          let s=` ${c.raw>=0?'+':''}${c.raw.toFixed(2)}%`;
          if (it&&!it.isBench) s+=`   peso: ${it.weight}%   contrib: ${it.contrib>=0?'+':''}${it.contrib.toFixed(2)}pp`;
          return s;
        }}}
      },
      scales:{
        x:{ grid:{color:'#edf2f7'}, ticks:{callback:v=>v+'%',font:{size:9}} },
        y:{ grid:{display:false}, ticks:{font:{size:10.5,weight:'600'},
            color:ctx2=>(!items[ctx2.index]||items[ctx2.index].isBench)?'#718096':'#2d3748'} }
      }
    }
  });
}

// ── Export PDF via html2canvas + jsPDF ──────────────────────────────────────
// Abordagem: captura cada .sheet como imagem de alta resolução e monta o PDF
// diretamente, sem usar o diálogo de impressão do browser.
// Vantagens: sem corte de canvas, sem problema de fundo branco no logo,
// sem dependência de eventos de print — o que está na tela é o que vai pro PDF.
async function exportPDF() {
  const btn = document.querySelector('.btn-print');
  const originalText = btn.innerHTML;

  try {
    btn.disabled = true;
    btn.innerHTML = '⏳ Gerando PDF…';

    const { jsPDF } = window.jspdf;
    // A4 em mm: 210 × 297
    const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const pageW = pdf.internal.pageSize.getWidth();   // 210 mm
    const pageH = pdf.internal.pageSize.getHeight();  // 297 mm
    const margin = 0; // sem margem extra — o .sheet já tem padding interno

    const sheets = document.querySelectorAll('.sheet');

    for (let i = 0; i < sheets.length; i++) {
      const sheet = sheets[i];

      // ── Força altura mínima de A4 para que o footer fique no rodapé ──
      // A4 ratio: 297/210 = 1.4142. Se o conteúdo for mais curto, o footer
      // ficaria no meio da página; com minHeight ele vai ao fundo.
      const a4MinH = Math.round(sheet.offsetWidth * (297 / 210));
      const prevMinH = sheet.style.minHeight;
      const prevPosition = sheet.style.position;
      sheet.style.minHeight = a4MinH + 'px';
      sheet.style.position  = 'relative';

      // Footer vai para o fundo absoluto da página
      const footer = sheet.querySelector('.pg-footer');
      const prevFooterStyle = footer ? footer.getAttribute('style') || '' : '';
      if (footer) {
        footer.style.position = 'absolute';
        footer.style.bottom   = '0';
        footer.style.left     = '0';
        footer.style.right    = '0';
      }

      // html2canvas captura exatamente o que aparece na tela
      const canvas = await html2canvas(sheet, {
        scale: 4,              // 4× resolução → ~416 DPI no A4 — texto nítido
        useCORS: true,         // carrega imagens cross-origin (logo)
        backgroundColor: '#ffffff',
        logging: false,
        windowWidth:  sheet.scrollWidth,
        windowHeight: Math.max(sheet.scrollHeight, a4MinH),
      });

      // Restaura estilos originais
      sheet.style.minHeight = prevMinH;
      sheet.style.position  = prevPosition;
      if (footer) footer.setAttribute('style', prevFooterStyle);

      // JPEG qualidade máxima: jsPDF embute nativamente sem reprocessamento
      const imgData = canvas.toDataURL('image/jpeg', 1.0);
      const imgW_mm = pageW - margin * 2;
      const imgH_mm = (canvas.height / canvas.width) * imgW_mm;

      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', margin, margin, imgW_mm, imgH_mm, undefined, 'NONE');
    }

    // Nome do arquivo = título da aba (ex: Factsheet_Carteira_de_Ações_2026-02)
    const fileName = (document.title || 'Factsheet').replace(/\s+/g, '_') + '.pdf';
    pdf.save(fileName);

  } catch(err) {
    alert('Erro ao gerar PDF: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}

// ── START ──
init();
</script>
</body>
</html>

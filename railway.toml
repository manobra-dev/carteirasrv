[build]
builder = "nixpacks"
buildCommand = "python3 -m pip install -r requirements.txt"

[deploy]
# --sem-yfinance: obrigatório em nuvem — Yahoo Finance bloqueia IPs de cloud
# providers e o yf.download() fica travado indefinidamente sem retornar erro.
# Usa brapi.dev para preços (price return, sem ajuste por dividendos).
# Para retorno total (dividendos incluídos), rode serve.py localmente sem essa flag.
startCommand = "python serve.py --sem-browser --sem-yfinance"
healthcheckPath = "/dashboard_carteiras_v2.html"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
